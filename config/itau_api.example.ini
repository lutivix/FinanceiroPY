# ==========================================
# CONFIGURAÇÃO DA API ITAÚ - ACCOUNT STATEMENT
# ==========================================
#
# INSTRUÇÕES:
# 1. Copie este arquivo para: config/itau_api.ini
# 2. Preencha com suas credenciais reais
# 3. NUNCA commite o arquivo itau_api.ini no Git!
#
# Documentação completa em: docs/Integracao/INTEGRACAO_API_ITAU.md

[credentials]
# Client ID fornecido pelo Itaú (após descriptografia)
# Exemplo: e26f2f89-0ead-4ca6-8bc3-dd44b4ab3cc7
client_id = 

# Client Secret recebido após envio do CSR
# Exemplo: secret_xxxxxxxxxxxxx
client_secret = 

[certificates]
# Caminho para o certificado assinado pelo Itaú (.crt)
cert_file = config/certificates/itau_certificate.crt

# Caminho para a chave privada do certificado (.key)
key_file = config/certificates/certificate_private.key

[api]
# Ambiente: sandbox ou production
environment = sandbox

# URLs base da API - NÃO ALTERAR
base_url_prod = https://account-statement.itau.com.br/account-statement/v1
base_url_sandbox = https://account-statement.rdhi.com.br/account-statement/v1

# URLs do STS (OAuth2) - NÃO ALTERAR
sts_url_prod = https://sts.itau.com.br/api/oauth/token
sts_url_sandbox = https://sts.rdhi.com.br/api/oauth/token

[account]
# ID da conta: Agência(4 dígitos) + Conta(7 dígitos) + DV(1 dígito)
# Exemplo: Agência 1500, Conta 0123456, DV 7 = 150001234567
statement_id = 

# Tipo de conta: current_account ou savings_account
account_type = current_account

[sync]
# Habilitar sincronização automática?
auto_sync_enabled = false

# Intervalo entre sincronizações automáticas (em horas)
sync_interval_hours = 6

# Quantos dias para trás buscar na primeira sincronização
default_days_back = 30

# Número máximo de tentativas em caso de erro
max_retries = 3

# Timeout para requisições (em segundos)
timeout_seconds = 30

# Tamanho máximo de página (máximo permitido: 1000)
page_size = 1000

[logging]
# Nível de log: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO

# Arquivo de log (será criado automaticamente)
log_file = logs/itau_api.log

# Formato do log
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

# Tamanho máximo do arquivo de log em MB (rotação automática)
max_log_size_mb = 10

# Número de arquivos de backup de log
backup_count = 5

[cache]
# Habilitar cache de tokens em memória?
enable_token_cache = true

# Tempo de antecedência para renovar token (em segundos)
# Token da API dura 5 minutos (300s), renovar com 1 minuto de antecedência
token_renewal_margin = 60

[error_handling]
# Tempo de espera entre tentativas em caso de erro (backoff exponencial)
# Formato: tentativa_1, tentativa_2, tentativa_3 (em segundos)
retry_delays = 1, 2, 5

# Códigos HTTP que devem ser retentados
retryable_status_codes = 408, 429, 500, 502, 503, 504

[notifications]
# Habilitar notificações por e-mail em caso de erro? (requer configuração SMTP)
email_notifications = false

# E-mail para receber notificações
notification_email = 

# Enviar notificação apenas após X erros consecutivos
error_threshold = 3
